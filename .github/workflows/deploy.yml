name: Deploy to Production

on:
  push:
    branches: [master]

jobs:
  deploy:
    name: Deploy to Hetzner VPS
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - name: Deploy via SSH
        uses: appleboy/ssh-action@v1
        with:
          host: ${{ secrets.SERVER_HOST }}
          username: root
          key: ${{ secrets.SERVER_SSH_KEY }}
          script: |
            cd /opt/whatsapp-campaigns

            # Preserve production .env (contains APP_KEY, secrets)
            cp .env.production /tmp/.env.production.bak

            # Pull latest code
            git fetch origin master
            git reset --hard origin/master

            # Restore production .env
            cp /tmp/.env.production.bak .env.production

            # Rebuild and restart containers
            docker compose build --no-cache app queue scheduler baileys frontend
            docker compose up -d --force-recreate

            # Wait for containers to be healthy
            sleep 5

            # Clear Laravel caches
            docker exec wc-app php artisan optimize:clear
            docker exec wc-app php artisan optimize

            # Run migrations
            docker exec wc-app php artisan migrate --force

            echo "Deploy complete: $(date)"
